<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<title>Poker Tracker by CCC</title>
	<style>
		.fixed-header {
			position: fixed;
			top: 0;
			max-width: 600px;
			width: 96%; /* Changed to 100% for better alignment */
			background-color: #003366; 
			padding: 0px 0;
			z-index: 1000;
			text-align: center;
			box-shadow: 0 2px 5px rgba(0,0,0,0.3);
		}

		body { 
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			padding: 10px ; 
			box-sizing: border-box; /* Ensures padding doesn't add to width */
			background-color: #003366;
			background-image: linear-gradient(135deg, #004080 25%, transparent 25%, transparent 75%, #004080 75%, #004080), 
							  linear-gradient(45deg, #004080 25%, transparent 25%, transparent 75%, #004080 75%, #004080);
			background-size: 50px 50px;
			color: white;
			display: flex;
			justify-content: center;
		}
		.container {
			width: 100%;
			max-width: 600px;
			margin: 0 auto;
			padding-top: 130px; /* IMPORTANT: Matches the height of your header + padding */
			box-sizing: border-box;
		}
		.card { 
			background: rgba(255, 255, 250, 0.95); 
			color: #333; 
			border-radius: 10px; 
			padding: 8px; 
			margin-bottom: 8px; 
			width: 100%;
			box-sizing: border-box; /* Crucial for mobile sizing */
			box-shadow: 0 6px 6px rgba(0,0,0,0.2); 
		}
		.hidden { display: none; }
		.player-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr; align-items: center; border-bottom: 1px solid #666; padding: 0.5rem 0; font-size: 1.2rem; }
		.p-name { font-weight: bold; }
		.p-buyin, .p-cashout, .p-net { text-align: center; }
		
		input { width: 100%; padding: 0.5rem; margin: 0.3rem 0; box-sizing: border-box; }
		button { 
			padding: 8px 8px; 
			font-size: 1rem; 
			font-weight: bold;
			border: 2px solid #ccc; /* Added style and color */
			border-radius: 10px; 
			cursor: pointer; 
			margin: 2px;
			background: #06c;
			font-family: sans-serif;
			color: white;
			transition: background-color 0.2s ease;
		}
		button:hover   { background-color: #0052a3; }
		.btn-main { background: #28a745; color: white; width: 100%; border-radius: 10px; padding: 0.6rem; }
		.btn-main:hover   { background-color: #218838; }
		
		#ledgerList { height: 350px; overflow-y: auto; border: 2px solid #ddd; padding: 0.5rem; background: white; font-size: 0.8rem; color: #333; }
		.ledger-item { 
			display: flex; 
			justify-content: space-between; 
			align-items: center; 
			padding: 10px 5px; /* Increased padding for better touch area */
			border-bottom: 1px solid #eee; 
			cursor: pointer; /* Makes it look clickable */
		}
		.ledger-item:active { background-color: #f0f0f0; } /* Visual feedback on mobile tap */
		.edit-btn { display: none; } /* We don't need the button element anymore */
		.ledger-item:hover .edit-btn { visibility: visible; }
		.bold-blue { color: #0056b3; font-weight: bold; }
		.bold-black { color: #000; font-weight: bold; }
		
		@media (max-width: 640px) {
			/* Force body to take full width and prevent scroll */
			body { padding: 5px; }
		
			/* Force the player row to use minimal spacing */
			.player-row { 
				grid-template-columns: 2fr 0.7fr 0.7fr 0.7fr; /* Adjusted for name space */
				padding: 6px 2px;
			}		
			/* Prevent long names from breaking the layout */
			.p-name { 
				word-wrap: break-word; 
				overflow-wrap: break-word; 
				hyphens: auto; 
			}
		}
	</style>
</head>

<body>
	<header class="fixed-header">
		<h1 style="...">♠️♥️ Poker Tracker ♣️♦️</h1>
		<div class="card" style="text-align:center;font-size: 1.2rem; font-weight:bold;">
			Total Stack: $<span id="totalInDisplay">0</span>  
			<span id="outWrapper" class="hidden">| Cash-out: $<span id="totalOutDisplay">0</span></span>
			<div id="status" class="hidden" style="margin-top: 5px; font-size: 1rem; color: #aaa;"></div>
		</div>
	</header>

	<div class="container">

		<div class="card" style="margin-bottom: 10px;">
			
	<input type="text" id="gameIdInput" placeholder="Enter Game ID">
	<button onclick="handleLoadGame()">Load Game</button>
    <button onclick="createNewGame()" style="background:#28a745;">New Game</button>
    <button onclick="shareGame()" style="background:#6c757d;">Share Game</button>
    <button onclick="resetAll()" style="background: #dc3545; color: white;">Clear All Data</button>
    <p>Active Game ID: <strong id="displayGameId" style="color: #007bff;">None</strong></p>
</div>
		<button id="minFlowBtn" class="hidden" onclick="minimizeFlow()" style="width:100%; background:#28a745; font-size:1.2rem; color:white; margin-top:10px; border:1; padding:10px; cursor:pointer;">Settlement?</button>
		<div class="card" id="flowResult" style="display:none; background:#28a745; color:white;font-size:1.2rem;"></div>
		<button onclick="document.getElementById('addPlayerSection').classList.toggle('hidden')" style="width: 100%; padding: 10px;">Toggle Add Player</button>
		<div id="addPlayerSection" class="card hidden">
			<input type="text" style="font-size: 1rem" id="pName" placeholder="Player Name">
			<input type="number" style="font-size: 1rem" id="initialBuyIn" value="200">
			<button class="btn-main" onclick="addPlayer()">Add Player</button>
		</div>
		<div class="card" style="margin-top: 0.5rem;">
			<div class="player-row" style="font-weight:bold; border-bottom: 2px solid #333;">
				<div>Player's Name</div><div style="text-align:center">💰In</div><div style="text-align:center">💰Out</div><div style="text-align:center">Net</div>
			</div>
			<div id="playerList"></div>
		</div>
		<div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
			<h3 style="margin: 1;">Transaction Ledger</h3>		
			
		</div>
		<div id="ledgerList"></div>
	
		<script>
			const supabaseClient = supabase.createClient(
				'https://qukzflxlacbiupgurohs.supabase.co', 
				'sb_publishable_eswBLvN5XVje_jZk5ZFCnw_unnlI5wA',
				{
					auth: { persistSession: false },
					db: { schema: 'public' },
					global: { headers: { 'x-client-info': 'poker-tracker' } }
				}
			);

			let players = {};
			let ledger = [];
			let currentGameId = new URLSearchParams(window.location.search).get('gameid') || "";
			
			// Load data from Supabase
			async function loadGame() {
				if (!currentGameId) return;
				
				const { data, error } = await supabaseClient
					.from('poker_games')
					.select('*')
					.eq('game_id', currentGameId)
					.single();
				updateGameIdDisplay(currentGameId);
						
				if (data) {
					players = data.players_data;
					ledger = data.ledger_data;
					render();
				}

			}

			function updateGameIdDisplay(id) {
				const display = document.getElementById('displayGameId');
				if (display) {
					display.innerText = id || "None";
				}
			}

			function handleLoadGame() {
				const id = document.getElementById('gameIdInput').value.trim();
				if (!id) {
					alert("Please enter a Game ID");
					return;
				}
				currentGameId = id;
				// Update URL so share button works correctly
				window.history.pushState({}, '', `?gameid=${currentGameId}`);
				loadGame();
			}

			async function saveGame() {
				if (!currentGameId) return;
			
				// Only save if there is actually data to save
				if (Object.keys(players).length === 0 && ledger.length === 0) {
					return; // Don't save empty games
				}
			
				const { error } = await supabaseClient
					.from('poker_games')
					.upsert({
						game_id: currentGameId,
						players_data: players,
						ledger_data: ledger
					});
			
				if (error) console.error("Save failed:", error.message);
			}
			
			// Updated Add Player with ID generation
			function generateGameId() {
				return Math.random().toString(36).substring(2, 8).toUpperCase();
			}
		
			function createNewGame() {

				players = {};
				ledger = [];
				currentGameId = generateGameId();
				window.history.pushState({}, '', `?gameid=${currentGameId}`);
				updateGameIdDisplay(currentGameId);
				
				render();
			}
		
			// IMPORTANT: Update your existing functions to call saveGame() 
			// after any change to 'players' or 'ledger'
			
		
			// Share Function
			function shareGame() {
				const url = window.location.href;
				navigator.clipboard.writeText(url);
				alert("Game URL copied to clipboard: " + url);
			}
		
			// Initial load
			if (currentGameId) loadGame();
			
				
			//let players = JSON.parse(localStorage.getItem('pokerPlayers')) || {};
			//let ledger = JSON.parse(localStorage.getItem('pokerLedger')) || [];
	
			async function addPlayer() {
				const name = document.getElementById('pName').value.trim();
				const amount = parseFloat(document.getElementById('initialBuyIn').value);
				
				if (!name || players[name]) { 
					alert("Enter a unique name"); 
					return; 
				}
				
				// 1. Initialize the player object
				players[name] = { buyIns: [], cashOuts: [], hasCashedOut: false };
				
				// 2. Add the initial buy-in transaction
				addTransaction(name, 'buyIn', amount);
				
				// 3. Force a save to Supabase immediately
				await saveGame(); 
				
				document.getElementById('pName').value = '';
			}
	
			function addTransaction(name, type, amount) {
				if (isNaN(amount)) return;
				
				// Calculate current totals for validation
				const gIn = Object.values(players).reduce((sum, p) => sum + p.buyIns.reduce((s, a) => s + a, 0), 0) + (type === 'buyIn' ? amount : 0);
				const gOut = Object.values(players).reduce((sum, p) => sum + p.cashOuts.reduce((s, a) => s + a, 0), 0) + (type === 'cashOut' ? amount : 0);
				
				if (type === 'cashOut' && gOut > gIn) { alert("Error: Total Cash Out exceeds Buy In!"); return; }
				if (type === 'cashOut') {
					players[name].cashOuts.push(amount);
					players[name].hasCashedOut = true;
				} else {
					players[name].buyIns.push(amount);
				}
	
				ledger.push({ name, type, amount, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
				render();
				saveGame(); // Add this to trigger the sync
			}
			
			function editLedger(index) {
				const entry = ledger[index];
				const newAmount = parseFloat(prompt(`Update ${entry.name} (${entry.type}):`, entry.amount));
				
				if (isNaN(newAmount)) return;
				if (entry.type === 'buyIn') {
					// Find the index of the specific buyIn amount in the array
					const bIndex = players[entry.name].buyIns.indexOf(entry.amount);
					if (bIndex > -1) {
						players[entry.name].buyIns[bIndex] = newAmount;
					}
				} else if (entry.type === 'cashOut') {
					// Find the index of the specific cashOut amount in the array
					const cIndex = players[entry.name].cashOuts.indexOf(entry.amount);
					if (cIndex > -1) {
						players[entry.name].cashOuts[cIndex] = newAmount;
					}
				}
				
				// Update the ledger entry itself
				entry.amount = newAmount;
				render();
				saveGame(); // Add this to trigger the sync
			}
	
			function minimizeFlow() {
				let balances = [];
				for (let name in players) {
					let totalOut = players[name].cashOuts.reduce((a,b)=>a+b, 0);
					let totalIn = players[name].buyIns.reduce((a,b)=>a+b, 0);
					let net = totalOut - totalIn;
					if (net !== 0) balances.push({ name, net });
				}
				let debtors = balances.filter(b => b.net < 0).sort((a,b) => a.net - b.net);
				let creditors = balances.filter(b => b.net > 0).sort((a,b) => b.net - a.net);
				let res = "<strong>Settlement Plan:</strong><br>";
				while(debtors.length > 0 && creditors.length > 0) {
					let d = debtors[0], c = creditors[0];
					let amt = Math.min(-d.net, c.net);
					res += `${d.name} pays ${c.name}: $${amt.toFixed(0)}<br>`;
					d.net += amt; c.net -= amt;
					if (Math.abs(d.net) < 0.1) debtors.shift();
					if (Math.abs(c.net) < 0.1) creditors.shift();
				}
				let div = document.getElementById('flowResult');
				div.innerHTML = res;
				div.style.display = 'block';
			}
			
			function promptAndAdd(name, type) {
				let input;
				let valid = false;
				while (!valid) {
					input = prompt(`Enter ${type} amount for ${name}:`);
					
					// If user hits "Cancel", break the loop
					if (input === null) return; 
			
					// Check if input is a valid number and not empty
					let amount = parseFloat(input);
					if (!isNaN(amount) && input.trim() !== "") {
						addTransaction(name, type, amount);
						valid = true;
					} else {
						alert("Invalid input! Please enter numbers only.");
					}
				}
			}
			
			function render() {
				localStorage.setItem('pokerPlayers', JSON.stringify(players));
				localStorage.setItem('pokerLedger', JSON.stringify(ledger));
				let totalIn = 0, totalOut = 0;
				const container = document.getElementById('playerList');
				container.innerHTML = '';
				for (const name in players) {
					const p = players[name];
					const totalBuyIn = p.buyIns.reduce((s, a) => s + a, 0);
					const totalCashOut = p.cashOuts.reduce((s, a) => s + a, 0); // Calculate sum
					
					totalIn += totalBuyIn;
					if (p.hasCashedOut) totalOut += totalCashOut;
					let net = p.hasCashedOut ? (totalCashOut - totalBuyIn) : null;
					
					container.innerHTML += `
						<div class="player-row">
							<div class="p-name">${name}<br>
								<button onclick="promptAndAdd('${name}', 'buyIn')">+Buy-in</button>
								<button onclick="promptAndAdd('${name}', 'cashOut')">Cash-Out</button>
							</div>
							<div class="p-buyin">$${totalBuyIn}</div>
							<div class="p-cashout">${p.hasCashedOut ? '$'+totalCashOut : '-'}</div>
							<div class="p-net" style="color:${net>=0?'green':'red'}">${net !== null ? (net>=0?'+':'')+net : '-'}</div>
						</div>`;
				}
				
				document.getElementById('totalInDisplay').innerText = totalIn;
				document.getElementById('totalOutDisplay').innerText = totalOut;
				document.getElementById('outWrapper').classList.toggle('hidden', totalOut === 0);
				document.getElementById('status').classList.toggle('hidden', totalOut === 0);
				
				const diff = totalIn - totalOut;
				document.getElementById('status').innerText = (diff === 0 && totalIn > 0) ? "✅ Balanced" : `(Remaining: $${diff})`;
				document.getElementById('minFlowBtn').classList.toggle('hidden', diff !== 0 || totalIn === 0);
	
				const lDiv = document.getElementById('ledgerList');
				lDiv.innerHTML = ledger.map((item, i) => `
					<div class="ledger-item" onclick="editLedger(${i})">
						<span>${item.time} - ${item.name} 
							<span class="${item.type==='buyIn'?'bold-blue':'bold-black'}">${item.type}</span>: $${item.amount}
						</span>
						<small style="color:#888;">(Tap to edit)</small>
					</div>`).join('');
			}
	
			async function resetAll() { 
				if(confirm("Clear all data and delete this game from the server?")) { 
					// 1. Delete the row from Supabase
					if (currentGameId) {
						const { error } = await supabaseClient
							.from('poker_games')
							.delete()
							.eq('game_id', currentGameId);
			
						if (error) {
							console.error("Error deleting game:", error);
							alert("Failed to delete game from server.");
						}
					}
			
					// 2. Clear local variables
					players = {}; 
					ledger = []; 

					// 3. Reset the UI
					document.getElementById('flowResult').style.display = 'none';
					document.getElementById('flowResult').innerHTML = '';
					
					// Clear the displayed Game ID
					currentGameId = "";
					updateGameIdDisplay(""); 
					
					render(); 
				} 
			}
			
			function shareGame() {
				const url = window.location.origin + window.location.pathname + "?gameid=" + currentGameId;
				if (navigator.share) {
					navigator.share({ title: 'Poker Tracker', url: url });
				} else {
					navigator.clipboard.writeText(url);
					alert("Link copied to clipboard!");
				}
			}
					
			render();
		</script>
	
		<footer style="text-align: center; margin-top: 10px; padding-bottom: 1px; color: gray;">
			<small><i>♠️♥️ Built by 
				<a href="mailto:ccchuah@yahoo.com" style="color: inherit;">CCC</a> 
				| 2026 Summer ♣️♦️
			</i></small>
		</footer>
	</div>
</body>
</html>
